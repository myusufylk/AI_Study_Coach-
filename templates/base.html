{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django App{% endblock %}</title>
    <!-- Link to our clean Flexbox CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <header class="navbar">
        <div class="logo">MyApp</div>
        <nav>
            <ul class="nav-links">
                <!-- Placeholders for future frontend development -->
                <li><a href="#">Home</a></li>
                <li><a href="#">Login</a></li>
                <li><a href="#">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="content">
        <!-- Other templates will inject their specific content here -->
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 MyApp. All rights reserved.</p>
    </footer>
</body>

</html>
